<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>黑洞吞噬游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(to bottom, #1a1a2e, #16213e);
            overflow: hidden;
            font-family: 'Microsoft YaHei', sans-serif;
        }
        
        #gameContainer {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }
        
        #gameCanvas {
            display: block;
            background: transparent;
        }
        
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            z-index: 100;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        
        #ui h1 {
            font-size: 24px;
            margin-bottom: 10px;
            color: #ff6b6b;
        }
        
        #ui p {
            font-size: 18px;
            margin: 5px 0;
        }
        
        #sizeBar {
            width: 200px;
            height: 20px;
            background: rgba(0,0,0,0.5);
            border-radius: 10px;
            margin-top: 10px;
            overflow: hidden;
            border: 2px solid #ff6b6b;
        }
        
        #sizeFill {
            height: 100%;
            background: linear-gradient(90deg, #ff6b6b, #ffd93d, #6bcf7f, #4d96ff, #9b59b6);
            transition: width 0.3s ease;
            border-radius: 8px;
        }
        
        #instructions {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            text-align: center;
            z-index: 200;
            background: rgba(0,0,0,0.8);
            padding: 40px;
            border-radius: 20px;
            border: 2px solid #ff6b6b;
        }
        
        #instructions h2 {
            font-size: 32px;
            color: #ff6b6b;
            margin-bottom: 20px;
        }
        
        #instructions p {
            font-size: 18px;
            margin: 10px 0;
            line-height: 1.6;
        }
        
        #instructions button {
            margin-top: 20px;
            padding: 15px 40px;
            font-size: 20px;
            background: linear-gradient(135deg, #ff6b6b, #ff8e53);
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        #instructions button:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(255, 107, 107, 0.4);
        }
        
        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            text-align: center;
            z-index: 200;
            background: rgba(0,0,0,0.9);
            padding: 50px;
            border-radius: 20px;
            border: 3px solid #ffd93d;
            display: none;
        }
        
        #gameOver h2 {
            font-size: 36px;
            color: #ffd93d;
            margin-bottom: 20px;
        }
        
        #gameOver p {
            font-size: 20px;
            margin: 10px 0;
        }
        
        #gameOver button {
            margin-top: 20px;
            padding: 15px 40px;
            font-size: 18px;
            background: linear-gradient(135deg, #6bcf7f, #4d96ff);
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        #gameOver button:hover {
            transform: scale(1.05);
        }
        
        .key {
            display: inline-block;
            background: rgba(255,255,255,0.2);
            padding: 5px 15px;
            border-radius: 5px;
            margin: 0 3px;
            border: 1px solid rgba(255,255,255,0.3);
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        
        <div id="ui">
            <h1>🌀 黑洞吞噬</h1>
            <p>分数: <span id="score">0</span></p>
            <p>大小: <span id="sizeText">微型黑洞</span></p>
            <div id="sizeBar">
                <div id="sizeFill" style="width: 5%"></div>
            </div>
            <p style="margin-top: 15px; font-size: 14px; opacity: 0.7;">
                提示：只能吞噬比自己小的物体
            </p>
        </div>
        
        <div id="instructions">
            <h2>🌀 黑洞吞噬游戏</h2>
            <p>你是一个微小的黑洞，降落在城市街道上</p>
            <p>通过吞噬比自己小的物体来不断成长</p>
            <p>最终目标：吞噬整个街道！</p>
            <p style="margin-top: 20px;">
                控制方式: <span class="key">↑</span> <span class="key">↓</span> <span class="key">←</span> <span class="key">→</span> 
                或 <span class="key">W</span> <span class="key">A</span> <span class="key">S</span> <span class="key">D</span>
            </p>
            <button id="startBtn">开始游戏</button>
        </div>
        
        <div id="gameOver">
            <h2>🎉 恭喜通关！</h2>
            <p>你已经吞噬了整个街道！</p>
            <p>最终分数: <span id="finalScore">0</span></p>
            <p>最终大小: <span id="finalSize">行星级黑洞</span></p>
            <button id="restartBtn">再玩一次</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        
        let gameState = 'menu';
        let score = 0;
        let particles = [];
        let swallowEffects = [];
        
        const blackhole = {
            x: 0,
            y: 0,
            radius: 30,
            baseRadius: 30,
            maxRadius: 0,
            speed: 5,
            baseSpeed: 5,
            rotation: 0,
            suctionPower: 0.5,
            level: 1,
            sizeName: '微型黑洞'
        };
        
        const keys = {
            up: false,
            down: false,
            left: false,
            right: false
        };
        
        const sizeLevels = [
            { name: '微型黑洞', minRadius: 20, maxRadius: 50, maxSize: 1000 },
            { name: '小型黑洞', minRadius: 50, maxRadius: 100, maxSize: 3000 },
            { name: '中型黑洞', minRadius: 100, maxRadius: 180, maxSize: 8000 },
            { name: '大型黑洞', minRadius: 180, maxRadius: 280, maxSize: 20000 },
            { name: '巨型黑洞', minRadius: 280, maxRadius: 400, maxSize: 50000 },
            { name: '行星级黑洞', minRadius: 400, maxRadius: 600, maxSize: 100000 }
        ];
        
        let objects = [];
        let buildings = [];
        let streetItems = [];
        
        const objectTypes = {
            trash: { name: '垃圾', size: 15, score: 10, color: '#8B4513', emoji: '🗑️' },
            can: { name: '易拉罐', size: 12, score: 15, color: '#C0C0C0', emoji: '🥫' },
            bottle: { name: '瓶子', size: 14, score: 12, color: '#90EE90', emoji: '🍾' },
            paper: { name: '纸张', size: 18, score: 8, color: '#F5F5DC', emoji: '📄' },
            bird: { name: '小鸟', size: 20, score: 25, color: '#FF6347', emoji: '🐦', flying: true },
            cat: { name: '猫', size: 25, score: 35, color: '#FFA500', emoji: '🐱' },
            dog: { name: '狗', size: 28, score: 40, color: '#8B4513', emoji: '🐕' },
            person: { name: '行人', size: 30, score: 50, color: '#4169E1', emoji: '🚶' },
            bike: { name: '自行车', size: 35, score: 60, color: '#20B2AA', emoji: '🚲' },
            motorcycle: { name: '摩托车', size: 45, score: 80, color: '#FF4500', emoji: '🏍️' },
            car: { name: '小汽车', size: 60, score: 150, color: '#E74C3C', emoji: '🚗' },
            truck: { name: '卡车', size: 80, score: 250, color: '#3498DB', emoji: '🚚' },
            bus: { name: '公交车', size: 90, score: 300, color: '#F1C40F', emoji: '🚌' },
            tree: { name: '树木', size: 50, score: 100, color: '#228B22', emoji: '🌳' },
            bench: { name: '长椅', size: 40, score: 45, color: '#8B4513', emoji: '🪑' },
            lamppost: { name: '路灯', size: 35, score: 55, color: '#708090', emoji: '💡' },
            newsstand: { name: '报刊亭', size: 55, score: 120, color: '#E67E22', emoji: '🏪' },
            phonebooth: { name: '电话亭', size: 45, score: 90, color: '#C0392B', emoji: '📞' },
            smallBuilding: { name: '小型建筑', size: 120, score: 500, color: '#95A5A6', emoji: '🏠', isBuilding: true },
            mediumBuilding: { name: '中型建筑', size: 180, score: 1000, color: '#7F8C8D', emoji: '🏢', isBuilding: true },
            largeBuilding: { name: '大型建筑', size: 250, score: 2000, color: '#5D6D7E', emoji: '🏬', isBuilding: true },
            skyscraper: { name: '摩天大楼', size: 350, score: 5000, color: '#2C3E50', emoji: '🏙️', isBuilding: true }
        };
        
        function initGame() {
            blackhole.x = canvas.width / 2;
            blackhole.y = canvas.height - 120;
            blackhole.radius = 30;
            blackhole.baseRadius = 30;
            blackhole.maxRadius = canvas.width * 0.6;
            blackhole.speed = 5;
            blackhole.level = 1;
            blackhole.sizeName = '微型黑洞';
            blackhole.rotation = 0;
            score = 0;
            particles = [];
            swallowEffects = [];
            objects = [];
            buildings = [];
            streetItems = [];
            
            generateStreet();
            updateUI();
        }
        
        function generateStreet() {
            const groundY = canvas.height - 80;
            
            const buildingTypes = ['smallBuilding', 'mediumBuilding', 'largeBuilding', 'skyscraper'];
            let buildingX = -100;
            
            while (buildingX < canvas.width + 400) {
                const typeKey = buildingTypes[Math.floor(Math.random() * buildingTypes.length)];
                const type = objectTypes[typeKey];
                
                buildings.push({
                    x: buildingX + type.size / 2,
                    y: groundY - type.size / 2,
                    width: type.size,
                    height: type.size * 1.5,
                    type: typeKey,
                    ...type,
                    windows: Math.floor(type.size / 30)
                });
                
                buildingX += type.size + 20 + Math.random() * 30;
            }
            
            const streetItemTypes = ['trash', 'can', 'bottle', 'paper', 'bench', 'lamppost', 'tree', 
                                      'newsstand', 'phonebooth', 'cat', 'dog', 'person', 'bike', 'motorcycle'];
            
            for (let i = 0; i < 30; i++) {
                const typeKey = streetItemTypes[Math.floor(Math.random() * streetItemTypes.length)];
                const type = objectTypes[typeKey];
                
                streetItems.push({
                    x: Math.random() * canvas.width * 2 - canvas.width * 0.5,
                    y: groundY - (type.flying ? 80 - Math.random() * 40 : type.size / 2),
                    originalX: 0,
                    originalY: 0,
                    type: typeKey,
                    ...type,
                    id: `street_${Date.now()}_${i}`
                });
            }
            
            const vehicleTypes = ['car', 'truck', 'bus'];
            for (let i = 0; i < 10; i++) {
                const typeKey = vehicleTypes[Math.floor(Math.random() * vehicleTypes.length)];
                const type = objectTypes[typeKey];
                
                streetItems.push({
                    x: Math.random() * canvas.width * 2 - canvas.width * 0.5,
                    y: groundY - type.size / 2 - 50,
                    originalX: 0,
                    originalY: 0,
                    type: typeKey,
                    ...type,
                    id: `vehicle_${Date.now()}_${i}`
                });
            }
            
            objects = [...streetItems, ...buildings.map(b => ({
                ...b,
                size: b.width,
                id: `building_${Date.now()}_${Math.random()}`
            }))];
        }
        
        document.addEventListener('keydown', (e) => {
            switch(e.key.toLowerCase()) {
                case 'arrowup':
                case 'w':
                    keys.up = true;
                    break;
                case 'arrowdown':
                case 's':
                    keys.down = true;
                    break;
                case 'arrowleft':
                case 'a':
                    keys.left = true;
                    break;
                case 'arrowright':
                case 'd':
                    keys.right = true;
                    break;
            }
        });
        
        document.addEventListener('keyup', (e) => {
            switch(e.key.toLowerCase()) {
                case 'arrowup':
                case 'w':
                    keys.up = false;
                    break;
                case 'arrowdown':
                case 's':
                    keys.down = false;
                    break;
                case 'arrowleft':
                case 'a':
                    keys.left = false;
                    break;
                case 'arrowright':
                case 'd':
                    keys.right = false;
                    break;
            }
        });
        
        document.getElementById('startBtn').addEventListener('click', startGame);
        document.getElementById('restartBtn').addEventListener('click', restartGame);
        
        function startGame() {
            gameState = 'playing';
            document.getElementById('instructions').style.display = 'none';
            initGame();
        }
        
        function restartGame() {
            document.getElementById('gameOver').style.display = 'none';
            gameState = 'playing';
            initGame();
        }
        
        function update() {
            if (gameState !== 'playing') return;
            
            blackhole.rotation += 0.05;
            
            const speed = blackhole.baseSpeed * (1 - (blackhole.radius - blackhole.baseRadius) / blackhole.maxRadius * 0.6);
            
            if (keys.up) {
                blackhole.y = Math.max(canvas.height * 0.3, blackhole.y - speed);
            }
            if (keys.down) {
                blackhole.y = Math.min(canvas.height - 80 - blackhole.radius / 2, blackhole.y + speed);
            }
            if (keys.left) {
                blackhole.x = Math.max(blackhole.radius, blackhole.x - speed);
            }
            if (keys.right) {
                blackhole.x = Math.min(canvas.width - blackhole.radius, blackhole.x + speed);
            }
            
            checkCollisions();
            updateParticles();
            updateSwallowEffects();
            updateSizeLevel();
            
            if (objects.length === 0 && score > 0) {
                gameWon();
            }
        }
        
        function checkCollisions() {
            for (let i = objects.length - 1; i >= 0; i--) {
                const obj = objects[i];
                
                const dx = obj.x - blackhole.x;
                const dy = obj.y - blackhole.y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                
                if (distance < blackhole.radius * 3) {
                    const pullStrength = blackhole.suctionPower * (blackhole.radius / obj.size);
                    const angle = Math.atan2(-dy, -dx);
                    
                    obj.x += Math.cos(angle) * pullStrength * 2;
                    obj.y += Math.sin(angle) * pullStrength * 2;
                    
                    if (obj.flying) {
                        obj.y += Math.sin(Date.now() / 300) * 0.3;
                    }
                }
                
                if (distance < blackhole.radius + obj.size / 3) {
                    if (obj.size <= blackhole.radius * 1.2) {
                        swallowObject(obj, i);
                    }
                }
            }
        }
        
        function swallowObject(obj, index) {
            for (let i = 0; i < 20; i++) {
                particles.push({
                    x: obj.x,
                    y: obj.y,
                    vx: (Math.random() - 0.5) * 10,
                    vy: (Math.random() - 0.5) * 10,
                    life: 60,
                    maxLife: 60,
                    color: obj.color,
                    size: Math.random() * 5 + 2
                });
            }
            
            swallowEffects.push({
                x: obj.x,
                y: obj.y,
                radius: 0,
                maxRadius: obj.size * 2,
                alpha: 1,
                color: obj.color
            });
            
            score += obj.score;
            
            const growthFactor = obj.score / 1000;
            blackhole.radius = Math.min(blackhole.maxRadius, blackhole.radius + growthFactor * 5);
            
            objects.splice(index, 1);
            
            updateUI();
        }
        
        function updateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                
                const dx = blackhole.x - p.x;
                const dy = blackhole.y - p.y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                
                p.vx += (dx / distance) * 0.5;
                p.vy += (dy / distance) * 0.5;
                
                p.x += p.vx;
                p.y += p.vy;
                p.life--;
                
                if (p.life <= 0 || distance < 10) {
                    particles.splice(i, 1);
                }
            }
        }
        
        function updateSwallowEffects() {
            for (let i = swallowEffects.length - 1; i >= 0; i--) {
                const effect = swallowEffects[i];
                effect.radius += 5;
                effect.alpha -= 0.03;
                
                if (effect.alpha <= 0) {
                    swallowEffects.splice(i, 1);
                }
            }
        }
        
        function updateSizeLevel() {
            for (let i = 0; i < sizeLevels.length; i++) {
                const level = sizeLevels[i];
                if (blackhole.radius >= level.minRadius && blackhole.radius < level.maxRadius) {
                    if (blackhole.level !== i + 1) {
                        blackhole.level = i + 1;
                        blackhole.sizeName = level.name;
                        updateUI();
                    }
                    break;
                }
            }
            
            if (blackhole.radius >= sizeLevels[sizeLevels.length - 1].minRadius) {
                blackhole.level = sizeLevels.length;
                blackhole.sizeName = sizeLevels[sizeLevels.length - 1].name;
            }
        }
        
        function updateUI() {
            document.getElementById('score').textContent = score;
            document.getElementById('sizeText').textContent = blackhole.sizeName;
            
            const maxPossibleSize = sizeLevels[sizeLevels.length - 1].maxRadius;
            const sizePercent = Math.min(100, (blackhole.radius / maxPossibleSize) * 100);
            document.getElementById('sizeFill').style.width = sizePercent + '%';
        }
        
        function gameWon() {
            gameState = 'won';
            document.getElementById('finalScore').textContent = score;
            document.getElementById('finalSize').textContent = blackhole.sizeName;
            document.getElementById('gameOver').style.display = 'block';
        }
        
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            drawBackground();
            drawStreet();
            drawBuildings();
            drawStreetItems();
            drawParticles();
            drawSwallowEffects();
            drawBlackhole();
        }
        
        function drawBackground() {
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#1a1a2e');
            gradient.addColorStop(0.5, '#16213e');
            gradient.addColorStop(1, '#0f3460');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
            for (let i = 0; i < 100; i++) {
                const x = (i * 137.5) % canvas.width;
                const y = (i * 73.3) % (canvas.height * 0.5);
                const size = Math.random() * 2;
                const twinkle = Math.sin(Date.now() / 1000 + i) * 0.5 + 0.5;
                ctx.globalAlpha = twinkle * 0.8;
                ctx.beginPath();
                ctx.arc(x, y, size, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.globalAlpha = 1;
        }
        
        function drawStreet() {
            const groundY = canvas.height - 80;
            
            const groundGradient = ctx.createLinearGradient(0, groundY, 0, canvas.height);
            groundGradient.addColorStop(0, '#2c3e50');
            groundGradient.addColorStop(1, '#1a252f');
            ctx.fillStyle = groundGradient;
            ctx.fillRect(0, groundY, canvas.width, 80);
            
            ctx.fillStyle = '#f1c40f';
            ctx.setLineDash([40, 30]);
            ctx.strokeStyle = '#f1c40f';
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(0, groundY + 30);
            ctx.lineTo(canvas.width, groundY + 30);
            ctx.stroke();
            ctx.setLineDash([]);
            
            ctx.fillStyle = '#7f8c8d';
            ctx.fillRect(0, groundY - 5, canvas.width, 10);
        }
        
        function drawBuildings() {
            buildings.forEach(building => {
                const buildingGradient = ctx.createLinearGradient(
                    building.x - building.width/2, building.y - building.height,
                    building.x + building.width/2, building.y
                );
                buildingGradient.addColorStop(0, '#5d6d7e');
                buildingGradient.addColorStop(1, '#2c3e50');
                
                ctx.fillStyle = buildingGradient;
                ctx.fillRect(
                    building.x - building.width/2,
                    building.y - building.height,
                    building.width,
                    building.height
                );
                
                ctx.fillStyle = '#2c3e50';
                ctx.fillRect(
                    building.x - building.width/2 + 5,
                    building.y - building.height,
                    building.width - 10,
                    building.height
                );
                
                const windowRows = Math.floor(building.height / 40);
                const windowCols = Math.floor(building.width / 35);
                const windowWidth = 20;
                const windowHeight = 25;
                const startX = building.x - building.width/2 + 15;
                const startY = building.y - building.height + 20;
                
                for (let row = 0; row < windowRows; row++) {
                    for (let col = 0; col < windowCols; col++) {
                        const isLit = Math.random() > 0.3 || Date.now() % 2000 < 1000;
                        
                        if (isLit) {
                            const glowGradient = ctx.createRadialGradient(
                                startX + col * 35 + windowWidth/2,
                                startY + row * 40 + windowHeight/2,
                                0,
                                startX + col * 35 + windowWidth/2,
                                startY + row * 40 + windowHeight/2,
                                15
                            );
                            glowGradient.addColorStop(0, 'rgba(255, 230, 150, 0.8)');
                            glowGradient.addColorStop(1, 'rgba(255, 230, 150, 0)');
                            ctx.fillStyle = glowGradient;
                            ctx.fillRect(
                                startX + col * 35 - 5,
                                startY + row * 40 - 5,
                                windowWidth + 10,
                                windowHeight + 10
                            );
                            
                            ctx.fillStyle = '#ffe696';
                        } else {
                            ctx.fillStyle = '#1a252f';
                        }
                        
                        ctx.fillRect(
                            startX + col * 35,
                            startY + row * 40,
                            windowWidth,
                            windowHeight
                        );
                    }
                }
                
                ctx.strokeStyle = '#1a252f';
                ctx.lineWidth = 2;
                ctx.strokeRect(
                    building.x - building.width/2,
                    building.y - building.height,
                    building.width,
                    building.height
                );
            });
        }
        
        function drawStreetItems() {
            objects.forEach(obj => {
                if (obj.isBuilding) return;
                
                const groundY = canvas.height - 80;
                
                if (obj.x > -100 && obj.x < canvas.width + 100) {
                    ctx.save();
                    ctx.translate(obj.x, obj.y);
                    
                    const scale = obj.size / 40;
                    ctx.scale(scale, scale);
                    
                    ctx.font = '40px Arial';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(obj.emoji, 0, 0);
                    
                    ctx.restore();
                    
                    if (!obj.flying) {
                        const shadowGradient = ctx.createRadialGradient(
                            obj.x, groundY - 2,
                            0,
                            obj.x, groundY - 2,
                            obj.size
                        );
                        shadowGradient.addColorStop(0, 'rgba(0, 0, 0, 0.4)');
                        shadowGradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
                        ctx.fillStyle = shadowGradient;
                        ctx.beginPath();
                        ctx.ellipse(obj.x, groundY - 2, obj.size * 0.8, obj.size * 0.3, 0, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
            });
        }
        
        function drawParticles() {
            particles.forEach(p => {
                const alpha = p.life / p.maxLife;
                ctx.globalAlpha = alpha;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.globalAlpha = 1;
        }
        
        function drawSwallowEffects() {
            swallowEffects.forEach(effect => {
                ctx.globalAlpha = effect.alpha;
                ctx.strokeStyle = effect.color;
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.arc(effect.x, effect.y, effect.radius, 0, Math.PI * 2);
                ctx.stroke();
            });
            ctx.globalAlpha = 1;
        }
        
        function drawBlackhole() {
            ctx.save();
            ctx.translate(blackhole.x, blackhole.y);
            
            for (let i = 5; i > 0; i--) {
                const ringRadius = blackhole.radius * (1 + i * 0.3);
                const ringGradient = ctx.createRadialGradient(
                    0, 0, blackhole.radius,
                    0, 0, ringRadius
                );
                ringGradient.addColorStop(0, `rgba(147, 112, 219, ${0.1 / i})`);
                ringGradient.addColorStop(0.5, `rgba(75, 0, 130, ${0.05 / i})`);
                ringGradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
                
                ctx.fillStyle = ringGradient;
                ctx.beginPath();
                ctx.arc(0, 0, ringRadius, 0, Math.PI * 2);
                ctx.fill();
            }
            
            ctx.save();
            ctx.rotate(blackhole.rotation);
            
            for (let i = 0; i < 3; i++) {
                ctx.save();
                ctx.rotate((Math.PI * 2 / 3) * i);
                
                const accretionGradient = ctx.createRadialGradient(
                    0, 0, blackhole.radius * 0.8,
                    0, 0, blackhole.radius * 1.8
                );
                accretionGradient.addColorStop(0, 'rgba(255, 100, 100, 0)');
                accretionGradient.addColorStop(0.3, `rgba(255, 150, 50, ${0.3 - i * 0.08})`);
                accretionGradient.addColorStop(0.5, `rgba(255, 200, 100, ${0.2 - i * 0.05})`);
                accretionGradient.addColorStop(0.7, `rgba(255, 255, 200, ${0.1 - i * 0.03})`);
                accretionGradient.addColorStop(1, 'rgba(255, 255, 255, 0)');
                
                ctx.fillStyle = accretionGradient;
                ctx.beginPath();
                ctx.ellipse(0, 0, blackhole.radius * 1.8, blackhole.radius * 0.4, 0, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.restore();
            }
            
            ctx.restore();
            
            const outerGlow = ctx.createRadialGradient(
                0, 0, blackhole.radius * 0.5,
                0, 0, blackhole.radius * 1.3
            );
            outerGlow.addColorStop(0, 'rgba(0, 0, 0, 1)');
            outerGlow.addColorStop(0.7, 'rgba(20, 0, 40, 0.8)');
            outerGlow.addColorStop(1, 'rgba(75, 0, 130, 0)');
            
            ctx.fillStyle = outerGlow;
            ctx.beginPath();
            ctx.arc(0, 0, blackhole.radius * 1.3, 0, Math.PI * 2);
            ctx.fill();
            
            const coreGradient = ctx.createRadialGradient(
                0, 0, 0,
                0, 0, blackhole.radius
            );
            coreGradient.addColorStop(0, '#000000');
            coreGradient.addColorStop(0.8, '#0a0a15');
            coreGradient.addColorStop(1, '#101030');
            
            ctx.fillStyle = coreGradient;
            ctx.beginPath();
            ctx.arc(0, 0, blackhole.radius, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.save();
            ctx.rotate(blackhole.rotation * 2);
            
            for (let i = 0; i < 8; i++) {
                const angle = (Math.PI * 2 / 8) * i;
                const spiralRadius = blackhole.radius * 0.7;
                
                const spiralGradient = ctx.createRadialGradient(
                    Math.cos(angle) * spiralRadius * 0.5,
                    Math.sin(angle) * spiralRadius * 0.5,
                    0,
                    Math.cos(angle) * spiralRadius,
                    Math.sin(angle) * spiralRadius,
                    blackhole.radius * 0.2
                );
                spiralGradient.addColorStop(0, 'rgba(138, 43, 226, 0.6)');
                spiralGradient.addColorStop(1, 'rgba(138, 43, 226, 0)');
                
                ctx.fillStyle = spiralGradient;
                ctx.beginPath();
                ctx.arc(
                    Math.cos(angle) * spiralRadius,
                    Math.sin(angle) * spiralRadius,
                    blackhole.radius * 0.15,
                    0, Math.PI * 2
                );
                ctx.fill();
            }
            
            ctx.restore();
            
            ctx.strokeStyle = 'rgba(138, 43, 226, 0.5)';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(0, 0, blackhole.radius, 0, Math.PI * 2);
            ctx.stroke();
            
            ctx.save();
            ctx.rotate(blackhole.rotation * 0.5);
            ctx.strokeStyle = 'rgba(138, 43, 226, 0.3)';
            ctx.lineWidth = 2;
            ctx.setLineDash([10, 10]);
            ctx.beginPath();
            ctx.ellipse(0, 0, blackhole.radius * 1.2, blackhole.radius * 0.3, 0, 0, Math.PI * 2);
            ctx.stroke();
            ctx.setLineDash([]);
            ctx.restore();
            
            ctx.restore();
        }
        
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }
        
        gameLoop();
    </script>
</body>
</html>
